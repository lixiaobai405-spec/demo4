<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>总览导出 - 领导力建模</title>
<style>
:root{--p:#6C216D;--p10:#F4ECF4;--p20:#E8D4E8;--p40:#BF88C0;--p60:#9A52A0;--p80:#7D3D7E;--pdk:#4A1550;
--a:#E18C3F;--a10:#FEF4E8;--a20:#FADCC0;--a60:#C97028;--adk:#A05510;
--bg:#F7F4F8;--sf:#FFF;--sf2:#FAF7FB;--br:#EAE0EC;--brk:#D0C0D3;
--t1:#1A1520;--t2:#5C506A;--t3:#9585A0;
--gr:#0F6E56;--grbg:#E1F5EE;--am:#7A4A08;--ambg:#FEF3C7;--rd:#991B1B;--rdbg:#FEE2E2;
--sh:0 2px 8px rgba(108,33,109,.08),0 1px 3px rgba(0,0,0,.04);--shh:0 8px 24px rgba(108,33,109,.14)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',Arial,sans-serif;background:var(--bg);color:var(--t1);line-height:1.6;font-size:14px;min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--brk);border-radius:5px}
.hdr{background:var(--p);padding:0 36px;height:54px;display:flex;align-items:center;gap:20px;flex-shrink:0}
.logo{font-size:14.5px;font-weight:600;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px;white-space:nowrap}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--a)}
.prog{display:flex;align-items:center;flex:1;gap:0}
.ps{display:flex;align-items:center;gap:5px;text-decoration:none}
.pd{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s}
.pd.dn{background:rgba(255,255,255,.28);color:#fff}
.pd.ac{background:var(--a);color:#fff;box-shadow:0 0 0 3px rgba(225,140,63,.3)}
.pd.nd{background:rgba(255,255,255,.12);color:rgba(255,255,255,.35)}
.pl{font-size:11px;color:rgba(255,255,255,.7);white-space:nowrap}.pl.ac{color:#fff;font-weight:500}
.pln{flex:1;height:1px;background:rgba(255,255,255,.2);min-width:14px}.pln.dn{background:rgba(255,255,255,.4)}
.ftr{background:var(--sf);border-top:1px solid var(--br);padding:13px 36px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:sticky;bottom:0;z-index:50}
.step-info{font-size:12.5px;color:var(--t3);font-weight:500}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:8px;font-size:13.5px;font-weight:500;border:1.5px solid transparent;cursor:pointer;transition:all .15s;font-family:inherit;text-decoration:none;line-height:1.3;white-space:nowrap}
.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.btn-p{background:var(--p);color:#fff;border-color:var(--p)}.btn-p:hover{background:var(--p80)}
.btn-a{background:var(--a);color:#fff;border-color:var(--a)}.btn-a:hover{background:var(--a60)}
.btn-o{background:var(--sf);color:var(--t1);border-color:var(--br)}.btn-o:hover{background:var(--bg)}
.btn-g{background:transparent;color:var(--t2);border-color:transparent;padding:5px 10px}.btn-g:hover{background:var(--bg)}
.btn-d{background:transparent;color:var(--rd);border-color:transparent;padding:5px 10px}.btn-d:hover{background:var(--rdbg)}
.btn-sm{padding:5px 12px;font-size:12.5px}
.btn-lg{padding:13px 32px;font-size:15px}
.lcard{background:var(--p10);border:1.5px solid var(--p20);border-left:3px solid var(--p);border-radius:0 8px 8px 0;padding:11px 15px;margin-bottom:16px;font-size:13px}
.lcard b{color:var(--p80);display:block;margin-bottom:2px;font-size:13px;font-weight:600}
.lcard p{color:var(--t2);line-height:1.55}
.sec-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
.sec-t{font-size:16px;font-weight:600;color:var(--t1)}
.sec-s{font-size:12.5px;color:var(--t2);margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:500}
.bg-gr{background:var(--grbg);color:var(--gr)}.bg-am{background:var(--ambg);color:var(--am)}
.bg-rd{background:var(--rdbg);color:var(--rd)}.bg-p{background:var(--p10);color:var(--p80)}
.bg-a{background:var(--a10);color:var(--adk)}.bg-gy{background:#F0EDF5;color:#6A5F7A}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--sf);border-radius:16px;padding:24px;width:100%;max-width:480px;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.m-hd{font-size:16px;font-weight:600;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;color:var(--t1)}
.mx{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t3);line-height:1}
.ff{margin-bottom:13px}.ff label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:5px}
.ff input,.ff textarea{width:100%;border:1.5px solid var(--br);border-radius:8px;padding:9px 12px;font-size:13.5px;font-family:inherit;outline:none;color:var(--t1);transition:border-color .15s}
.ff input:focus,.ff textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--p10)}
.ff textarea{resize:vertical;min-height:80px;line-height:1.6}
.mft{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.main{flex:1;padding:22px 36px;max-width:1100px;margin:0 auto;width:100%}
.card{background:var(--sf);border-radius:12px;border:1px solid var(--br);box-shadow:var(--sh)}
</style>
<style>
.done-banner{background:linear-gradient(135deg,var(--p) 0%,var(--p60) 100%);border-radius:14px;padding:24px 28px;color:#fff;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.done-banner h2{font-size:22px;font-weight:700;margin-bottom:5px}
.done-banner p{font-size:14px;opacity:.85;line-height:1.6}
.done-banner .export-btns{display:flex;gap:10px;flex-shrink:0;flex-wrap:wrap}
.btn-word{background:#fff;color:var(--p);border:none;padding:10px 20px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-word:hover{background:var(--p10)}
.btn-pdf{background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.5);padding:10px 20px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-pdf:hover{background:rgba(255,255,255,.3)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
.stat-card{background:var(--sf);border-radius:11px;border:1px solid var(--br);padding:16px 20px;text-align:center;box-shadow:var(--sh)}
.stat-num{font-size:30px;font-weight:700;color:var(--p);line-height:1.1}
.stat-lbl{font-size:12px;color:var(--t2);margin-top:5px;font-weight:500}
.ov-list{display:flex;flex-direction:column;gap:11px}
.ov-item{background:var(--sf);border-radius:12px;border:1.5px solid var(--br);box-shadow:var(--sh);overflow:hidden}
.ov-hd{padding:14px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.ov-hd:hover{background:var(--sf2)}
.ov-num{width:26px;height:26px;border-radius:50%;background:var(--p10);color:var(--p80);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ov-nm{font-size:14.5px;font-weight:600;flex:1;color:var(--t1)}
.ov-chev{font-size:12px;color:var(--t3);transition:transform .2s}
.ov-chev.open{transform:rotate(90deg)}
.ov-bd{display:none;padding:0 18px 18px;border-top:1px solid var(--br)}
.ov-bd.open{display:block}
.ov-desc{font-size:13.5px;color:var(--t2);line-height:1.75;padding:14px 0 12px}
.beh-section{margin-bottom:14px}
.beh-section:last-child{margin-bottom:0}
.beh-lbl{font-size:12px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.beh-item{font-size:13px;line-height:1.65;padding:7px 11px;border-radius:8px;margin-bottom:5px;border-left:2.5px solid}
.beh-ex{background:var(--grbg);border-color:var(--gr);color:#1A3025}
.beh-st{background:var(--p10);border-color:var(--p);color:var(--pdk)}
.beh-bl{background:var(--rdbg);border-color:var(--rd);color:#3B1010}
</style>
</head><body>
<header class="hdr">
  <a class="logo" href="index.html"><span class="logo-dot"></span>领导力建模智能体</a>
  <nav class="prog"><a class="ps" href="step1.html"><div class="pd dn">✓</div><span class="pl ">信息采集</span></a><div class="pln dn"></div><a class="ps" href="step2.html"><div class="pd dn">✓</div><span class="pl ">维度确认</span></a><div class="pln dn"></div><a class="ps" href="step3.html"><div class="pd dn">✓</div><span class="pl ">描述建立</span></a><div class="pln dn"></div><a class="ps" href="step4.html"><div class="pd dn">✓</div><span class="pl ">行为锚定</span></a><div class="pln dn"></div><a class="ps" href="step5.html"><div class="pd ac">5</div><span class="pl ac">总览导出</span></a></nav>
</header>
<div class="main">
  <div class="done-banner">
    <div><h2>🏆 领导力模型构建完成！</h2><p>中层管理者领导力模型 · 5 个维度 · 完整行为锚定</p></div>
    <div class="export-btns">
      <button class="btn-word" onclick="doExport('word')">⬇ 导出 Word</button>
      <button class="btn-pdf" onclick="doExport('pdf')">⬇ 导出 PDF</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num">5</div><div class="stat-lbl">领导力维度</div></div>
    <div class="stat-card"><div class="stat-num">25</div><div class="stat-lbl">行为锚定描述</div></div>
    <div class="stat-card"><div class="stat-num" id="timeUsed">—</div><div class="stat-lbl">完成时间</div></div>
  </div>
  <div class="sec-row"><div class="sec-t">完整模型总览</div><div class="sec-s">点击展开查看各维度详细内容</div></div>
  <div class="ov-list" id="ovList"></div>
  <div style="margin-top:28px;text-align:center;padding:20px;background:var(--sf);border-radius:12px;border:1px solid var(--br)">
    <p style="font-size:13.5px;color:var(--t2);margin-bottom:14px">需要为其他管理层级建模，或重新构建？</p>
    <a href="index.html" class="btn btn-o">← 返回首页</a>
    <a href="step1.html" class="btn btn-p" style="margin-left:10px">重新建模</a>
  </div>
</div>
<footer class="ftr">
  <a href="step4.html" class="btn btn-o">← 上一步</a>
  <span class="step-info">步骤 5 / 5</span>
  <button class="btn btn-p" id="nextBtn" onclick="goNext()" >完成 ✓</button>
</footer>

<script>
const data=[
  {id:"D1",nm:"战略引领",desc:"在中层管理者层级，战略引领体现在能够深度理解公司战略意图，将其转化为本部门年度目标和季度优先级，定期向团队解读战略背景，确保成员理解日常工作与战略的连接，保持执行方向不偏离。",ex:["每季度主动梳理战略执行差距，制定针对性调整方案并向上汇报，推动资源提前到位，确保团队执行方向持续对齐公司战略。"],st:["每月召开部门战略对齐会，将公司战略拆解为本月工作重点，确保成员清楚自身工作的战略意义。","遇到战略方向变化时，主动组织宣贯，解答成员疑惑，减少方向摇摆和意义感缺失。"],bl:["仅在上级传达时被动了解战略变化，未主动向团队传导，导致执行方向与公司战略出现明显落差。","将战略目标直接下发，未做拆解说明，成员不理解工作意义，执行主动性明显不足。"]},
  {id:"D2",nm:"团队赋能",desc:"聚焦团队成员的能力成长，通过定期 1on1 识别个人瓶颈，结合项目历练给予针对性辅导，在关键决策中有意识地授权，使成员在承担责任中快速成长，形成自我驱动的学习氛围。",ex:["针对每位核心成员建立个人发展档案，结合业务项目设计成长路径，辅导成功率超过 80%，被辅导成员绩效持续提升。"],st:["每双周与每位成员开展 1on1，了解工作卡点和成长需求，提供具体建议并跟踪落实情况。","在分配任务时有意识地授权，给予成员在安全范围内试错的机会，并在复盘时给出建设性反馈。"],bl:["成员反映缺乏辅导和反馈，对自身能力瓶颈不清楚，遇到困难只能靠自己摸索解决。","任务分配后不再关注过程，待问题出现才介入，错失最佳辅导时机。"]},
  {id:"D3",nm:"跨部门协作",desc:"主动识别跨部门协作节点，建立定期同步机制，在资源冲突和利益分歧出现时介入斡旋，确保己方需求清晰传递，推动多方达成共识，减少因信息不对称带来的摩擦和延误。",ex:["主动识别跨部门项目风险，提前 2 周启动协调，推动各方达成资源承诺，项目交付准时率显著高于同级平均。"],st:["在项目启动阶段对齐各相关方的需求和约束，建立共同工作规则，减少执行中的摩擦。","遇到跨部门分歧时，主动约集双方面对面沟通，聚焦共同目标而非立场。"],bl:["跨部门协作中仅关注本团队需求，对其他团队的约束缺乏了解，导致方案推进阻力大。","遇到跨部门问题习惯向上升级，而非主动在平级层面解决，增加管理层成本。"]},
  {id:"D4",nm:"执行与交付",desc:"将团队目标拆解至每位成员的具体任务，明确时间节点与交付标准，每周追踪关键里程碑，遇到执行偏差当天启动资源协调，确保承诺按期高质量完成。",ex:["每周主动梳理关键路径，识别潜在风险并提前 3 天预警，带方案汇报，推动关键里程碑零延误。"],st:["将季度目标拆解为每周任务清单，明确负责人和截止时间，每周同步进展并记录风险项。","遇到执行阻碍当天启动协调，超过 48 小时未解决的风险主动向上汇报，不拖延处理。"],bl:["任务分配后缺乏跟踪，仅在截止日期临近才发现滞后，频繁以「没想到」为由进行事后解释。","对承诺事项管理宽松，成员未完成也未追责，团队整体交付可靠性差。"]},
  {id:"D5",nm:"沟通影响力",desc:"根据汇报对象灵活调整沟通策略：向上聚焦结论和风险，横向强调共同利益，向下重在拆解和激励，确保信息准确传递并被对方真正理解和采纳。",ex:["在重大决策推进中，提前识别各方关切，设计分层沟通方案，有效化解阻力，方案落地率高于同级平均。"],st:["向上汇报时先结论后细节，清晰呈现核心选项及利弊，便于上级快速决策。","横向协作时主动换位思考对方立场，找到利益共同点作为切入，而非直接提要求或施压。"],bl:["汇报时缺乏重点，信息冗长且逻辑不清，上级需要反复追问才能了解核心问题。","横向协作中采用命令式而非协商式沟通，引发合作方抵触情绪，协作摩擦持续存在。"]},
];
let open={};

function render(){
  document.getElementById("ovList").innerHTML=data.map((d,i)=>{
    const isOpen=open[d.id]||false;
    return `<div class="ov-item">
      <div class="ov-hd" onclick="togOv('${d.id}')">
        <div class="ov-num">${i+1}</div>
        <div class="ov-nm">${d.nm}</div>
        <span class="ov-chev ${isOpen?"open":""}">▶</span>
      </div>
      <div class="ov-bd ${isOpen?"open":""}">
        <div class="ov-desc">${d.desc}</div>
        <div class="beh-section"><div class="beh-lbl" style="color:var(--gr)">⭐ 优秀水平</div>${d.ex.map(t=>`<div class="beh-item beh-ex">${t}</div>`).join("")}</div>
        <div class="beh-section"><div class="beh-lbl" style="color:var(--p80)">✅ 达标水平</div>${d.st.map(t=>`<div class="beh-item beh-st">${t}</div>`).join("")}</div>
        <div class="beh-section"><div class="beh-lbl" style="color:var(--rd)">⚠️ 不达标</div>${d.bl.map(t=>`<div class="beh-item beh-bl">${t}</div>`).join("")}</div>
      </div>
    </div>`;
  }).join("");
}

function togOv(id){open[id]=!open[id];render();}
function doExport(t){alert(`✅ 正在导出 ${t==="word"?"Word (.docx)":"PDF (.pdf)"} 文档\n\n《中层管理者领导力模型》\n\n包含：5个维度 · 维度定义 · 定位描述 · 25条行为锚定\n\n（原型演示 · 实际产品中将自动下载文件）`);}
function goNext(){alert("模型已完成！\n\n您可以：\n1. 继续导出文档\n2. 点击「重新建模」构建其他层级的模型\n3. 返回首页了解更多功能");}

// Time display
const t=new Date();document.getElementById("timeUsed").textContent=t.getHours()+":"+String(t.getMinutes()).padStart(2,"0");
render();
</script>
</body></html>
