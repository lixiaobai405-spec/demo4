<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>行为锚定 - 领导力建模</title>
<style>
:root{--p:#6C216D;--p10:#F4ECF4;--p20:#E8D4E8;--p40:#BF88C0;--p60:#9A52A0;--p80:#7D3D7E;--pdk:#4A1550;
--a:#E18C3F;--a10:#FEF4E8;--a20:#FADCC0;--a60:#C97028;--adk:#A05510;
--bg:#F7F4F8;--sf:#FFF;--sf2:#FAF7FB;--br:#EAE0EC;--brk:#D0C0D3;
--t1:#1A1520;--t2:#5C506A;--t3:#9585A0;
--gr:#0F6E56;--grbg:#E1F5EE;--am:#7A4A08;--ambg:#FEF3C7;--rd:#991B1B;--rdbg:#FEE2E2;
--sh:0 2px 8px rgba(108,33,109,.08),0 1px 3px rgba(0,0,0,.04);--shh:0 8px 24px rgba(108,33,109,.14)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',Arial,sans-serif;background:var(--bg);color:var(--t1);line-height:1.6;font-size:14px;min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--brk);border-radius:5px}
.hdr{background:var(--p);padding:0 36px;height:54px;display:flex;align-items:center;gap:20px;flex-shrink:0}
.logo{font-size:14.5px;font-weight:600;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px;white-space:nowrap}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--a)}
.prog{display:flex;align-items:center;flex:1;gap:0}
.ps{display:flex;align-items:center;gap:5px;text-decoration:none}
.pd{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s}
.pd.dn{background:rgba(255,255,255,.28);color:#fff}
.pd.ac{background:var(--a);color:#fff;box-shadow:0 0 0 3px rgba(225,140,63,.3)}
.pd.nd{background:rgba(255,255,255,.12);color:rgba(255,255,255,.35)}
.pl{font-size:11px;color:rgba(255,255,255,.7);white-space:nowrap}.pl.ac{color:#fff;font-weight:500}
.pln{flex:1;height:1px;background:rgba(255,255,255,.2);min-width:14px}.pln.dn{background:rgba(255,255,255,.4)}
.ftr{background:var(--sf);border-top:1px solid var(--br);padding:13px 36px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:sticky;bottom:0;z-index:50}
.step-info{font-size:12.5px;color:var(--t3);font-weight:500}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:8px;font-size:13.5px;font-weight:500;border:1.5px solid transparent;cursor:pointer;transition:all .15s;font-family:inherit;text-decoration:none;line-height:1.3;white-space:nowrap}
.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.btn-p{background:var(--p);color:#fff;border-color:var(--p)}.btn-p:hover{background:var(--p80)}
.btn-a{background:var(--a);color:#fff;border-color:var(--a)}.btn-a:hover{background:var(--a60)}
.btn-o{background:var(--sf);color:var(--t1);border-color:var(--br)}.btn-o:hover{background:var(--bg)}
.btn-g{background:transparent;color:var(--t2);border-color:transparent;padding:5px 10px}.btn-g:hover{background:var(--bg)}
.btn-d{background:transparent;color:var(--rd);border-color:transparent;padding:5px 10px}.btn-d:hover{background:var(--rdbg)}
.btn-sm{padding:5px 12px;font-size:12.5px}
.btn-lg{padding:13px 32px;font-size:15px}
.lcard{background:var(--p10);border:1.5px solid var(--p20);border-left:3px solid var(--p);border-radius:0 8px 8px 0;padding:11px 15px;margin-bottom:16px;font-size:13px}
.lcard b{color:var(--p80);display:block;margin-bottom:2px;font-size:13px;font-weight:600}
.lcard p{color:var(--t2);line-height:1.55}
.sec-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
.sec-t{font-size:16px;font-weight:600;color:var(--t1)}
.sec-s{font-size:12.5px;color:var(--t2);margin-top:3px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:500}
.bg-gr{background:var(--grbg);color:var(--gr)}.bg-am{background:var(--ambg);color:var(--am)}
.bg-rd{background:var(--rdbg);color:var(--rd)}.bg-p{background:var(--p10);color:var(--p80)}
.bg-a{background:var(--a10);color:var(--adk)}.bg-gy{background:#F0EDF5;color:#6A5F7A}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--sf);border-radius:16px;padding:24px;width:100%;max-width:480px;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.m-hd{font-size:16px;font-weight:600;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;color:var(--t1)}
.mx{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t3);line-height:1}
.ff{margin-bottom:13px}.ff label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:5px}
.ff input,.ff textarea{width:100%;border:1.5px solid var(--br);border-radius:8px;padding:9px 12px;font-size:13.5px;font-family:inherit;outline:none;color:var(--t1);transition:border-color .15s}
.ff input:focus,.ff textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--p10)}
.ff textarea{resize:vertical;min-height:80px;line-height:1.6}
.mft{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.main{flex:1;padding:22px 36px;max-width:1100px;margin:0 auto;width:100%}
.card{background:var(--sf);border-radius:12px;border:1px solid var(--br);box-shadow:var(--sh)}
</style>
<style>
.anc-acc{display:flex;flex-direction:column;gap:11px}
.anc-item{background:var(--sf);border-radius:12px;border:1.5px solid var(--br);box-shadow:var(--sh);overflow:hidden}
.anc-hd{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background .15s}
.anc-hd:hover{background:var(--sf2)}
.anc-chev{font-size:13px;color:var(--t3);transition:transform .2s;flex-shrink:0}
.anc-chev.open{transform:rotate(90deg)}
.anc-nm{font-size:14px;font-weight:600;flex:1;color:var(--t1)}
.anc-bd{display:none;padding:0 16px 16px}
.anc-bd.open{display:block}
.anc-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:12px}
.col-hd{font-size:12px;font-weight:600;padding:6px 10px;border-radius:8px;margin-bottom:8px;text-align:center;display:flex;align-items:center;justify-content:center;gap:5px}
.col-ex{background:var(--grbg);color:var(--gr)}
.col-st{background:var(--p10);color:var(--p80)}
.col-bl{background:var(--rdbg);color:var(--rd)}
.beh{font-size:12.5px;color:var(--t1);line-height:1.65;padding:8px 10px;border-radius:7px;background:var(--bg);margin-bottom:6px;border:1.5px solid transparent;outline:none;display:block;width:100%;transition:all .15s;cursor:text}
.beh:hover{border-color:var(--br);background:var(--sf)}
.beh:focus{border-color:var(--p);background:var(--sf);box-shadow:0 0 0 3px var(--p10)}
.beh-placeholder{font-size:12px;color:var(--t3);padding:8px 10px;border-radius:7px;border:1.5px dashed var(--brk);text-align:center;cursor:pointer;transition:all .15s}
.beh-placeholder:hover{border-color:var(--p);color:var(--p)}
</style>
</head><body>
<header class="hdr">
  <a class="logo" href="index.html"><span class="logo-dot"></span>领导力建模智能体</a>
  <nav class="prog"><a class="ps" href="step1.html"><div class="pd dn">✓</div><span class="pl ">信息采集</span></a><div class="pln dn"></div><a class="ps" href="step2.html"><div class="pd dn">✓</div><span class="pl ">维度确认</span></a><div class="pln dn"></div><a class="ps" href="step3.html"><div class="pd dn">✓</div><span class="pl ">描述建立</span></a><div class="pln dn"></div><a class="ps" href="step4.html"><div class="pd ac">4</div><span class="pl ac">行为锚定</span></a><div class="pln "></div><a class="ps" href="step5.html"><div class="pd nd">5</div><span class="pl ">总览导出</span></a></nav>
</header>
<div class="main">
  <div class="lcard"><b>行为锚定生成（M04）— 第三次人机交接</b><p>AI 已为每个维度生成 BARS 行为锚定（优秀 / 达标 / 不达标三档）。展开每个维度查看详情，点击任意行为描述直接编辑，所有描述须以行为动词开头。</p></div>
  <div class="sec-row"><div class="sec-t">行为锚定（BARS）</div><div class="sec-s">点击展开查看并编辑各维度行为描述</div></div>
  <div class="anc-acc" id="ancAcc"></div>
</div>
<footer class="ftr">
  <a href="step3.html" class="btn btn-o">← 上一步</a>
  <span class="step-info">步骤 4 / 5</span>
  <button class="btn btn-p" id="nextBtn" onclick="goNext()" >完成确认，查看总览 →</button>
</footer>

<script>
const anchors=[
  {id:"D1",nm:"战略引领",ex:["每季度主动梳理战略执行差距，制定针对性调整方案并向上汇报，推动资源提前到位，确保团队执行方向持续对齐公司战略。"],st:["每月召开部门战略对齐会，将公司战略拆解为本月工作重点，确保成员清楚自身工作的战略意义。","遇到战略方向变化时，主动组织宣贯，解答成员疑惑，减少执行中的方向摇摆和意义感缺失。"],bl:["仅在上级传达时被动了解战略变化，未主动向团队传导，导致执行方向与公司战略出现明显落差。","将战略目标直接下发，未做拆解说明，成员不理解工作意义，执行主动性明显不足。"]},
  {id:"D2",nm:"团队赋能",ex:["针对每位核心成员建立个人发展档案，结合业务项目设计成长路径，辅导成功率超过 80%，被辅导成员绩效持续提升。"],st:["每双周与每位成员开展 1on1，了解工作卡点和成长需求，提供具体建议并跟踪落实情况。","在分配任务时有意识地授权，给予成员在安全范围内试错的机会，并在复盘时给出建设性反馈。"],bl:["成员反映缺乏辅导和反馈，对自身能力瓶颈不清楚，遇到困难只能靠自己摸索解决。","任务分配后不再关注过程，待问题出现才介入，错失最佳辅导时机。"]},
  {id:"D3",nm:"跨部门协作",ex:["主动识别跨部门项目风险，提前 2 周启动协调，推动各方达成资源承诺，项目交付准时率显著高于同级平均水平。"],st:["在项目启动阶段对齐各相关方的需求和约束，建立共同工作规则，减少执行中的摩擦。","遇到跨部门分歧时，主动约集双方面对面沟通，聚焦共同目标而非立场，推动达成可行方案。"],bl:["跨部门协作中仅关注本团队需求，对其他团队的约束缺乏了解，导致方案推进阻力大。","遇到跨部门问题习惯向上升级，而非主动在平级层面解决，增加管理层协调成本。"]},
  {id:"D4",nm:"执行与交付",ex:["每周主动梳理关键路径，识别潜在风险并提前 3 天预警，带方案汇报，推动关键里程碑零延误。"],st:["将季度目标拆解为每周任务清单，明确负责人和截止时间，每周同步进展并记录风险项。","遇到执行阻碍当天启动协调，超过 48 小时未解决的风险主动向上汇报，不拖延处理。"],bl:["任务分配后缺乏跟踪，仅在截止日期临近才发现滞后，频繁以「没想到」为由进行事后解释。","对承诺事项管理宽松，成员未完成也未追责，团队整体交付可靠性差。"]},
  {id:"D5",nm:"沟通影响力",ex:["在重大决策推进中，提前识别各方关切，设计分层沟通方案，有效化解阻力，方案落地率高于同级平均。"],st:["向上汇报时先结论后细节，清晰呈现核心选项及利弊，便于上级快速决策。","横向协作时主动换位思考对方立场，找到利益共同点作为切入，而非直接提要求或施压。"],bl:["汇报时缺乏重点，信息冗长且逻辑不清，上级需要反复追问才能了解核心问题。","横向协作中采用命令式而非协商式沟通，引发合作方抵触情绪，协作摩擦持续存在。"]},
];
let openMap={"D1":true};

function render(){
  document.getElementById("ancAcc").innerHTML=anchors.map(a=>{
    const isOpen=openMap[a.id]||false;
    return `<div class="anc-item">
      <div class="anc-hd" onclick="toggle('${a.id}')">
        <span class="anc-chev ${isOpen?"open":""}">▶</span>
        <span class="anc-nm">${a.nm}</span>
        <span class="badge bg-gy">${a.ex.length+a.st.length+a.bl.length} 条行为</span>
      </div>
      <div class="anc-bd ${isOpen?"open":""}">
        <div class="anc-cols">
          <div>
            <div class="col-hd col-ex">⭐ 优秀水平</div>
            ${a.ex.map((t,j)=>`<div class="beh" contenteditable="true" onblur="saveBeh('${a.id}','ex',${j},this.textContent)">${t}</div>`).join("")}
          </div>
          <div>
            <div class="col-hd col-st">✅ 达标水平</div>
            ${a.st.map((t,j)=>`<div class="beh" contenteditable="true" onblur="saveBeh('${a.id}','st',${j},this.textContent)">${t}</div>`).join("")}
          </div>
          <div>
            <div class="col-hd col-bl">⚠️ 不达标</div>
            ${a.bl.map((t,j)=>`<div class="beh" contenteditable="true" onblur="saveBeh('${a.id}','bl',${j},this.textContent)">${t}</div>`).join("")}
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
}

function toggle(id){openMap[id]=!openMap[id];render();}
function saveBeh(aid,lv,idx,t){const a=anchors.find(x=>x.id===aid);if(a&&a[lv])a[lv][idx]=t.trim();}
function goNext(){localStorage.setItem("lm_anchors",JSON.stringify(anchors));window.location.href="step5.html";}
render();
</script>
</body></html>
