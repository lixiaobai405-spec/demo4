<!DOCTYPE html>
<html lang="zh-CN">
<!--
================================================================
  领导力建模智能体 · 完整交互原型 · 开发交付版
================================================================
  版本    : MVP v1.0
  架构    : 原生 HTML5 / CSS3 / ES6 SPA (无框架)
  外部依赖 :
    - mammoth.js ^1.6.0  — DOCX 文本提取
    - Anthropic Messages API — AI 对话 & 文档解析
  API Model : claude-sonnet-4-20250514
  颜色规范 :
    主色  #6C216D  辅助色  #E18C3F  背景  #F7F4F8

  页面流程 :
    首页 (index) → M01 信息采集 → M02 维度确认
    → M03 描述建立 → M04 行为锚定 → M05 总览导出

  数据流 :
    STATE 对象 → localStorage (lm_*)
    AI 调用 → /v1/messages (由后端代理注入 API Key)

  生产接入 TODO :
    [ ] 后端代理 Anthropic API Key，前端只调用内部接口
    [ ] 真实文档解析服务替换浏览器端 mammoth.js
    [ ] Word/PDF 导出使用 docx.js 或服务端渲染
    [ ] 状态持久化迁移至用户 session / 数据库
    [ ] 对话摘要改为后端结构化接口，避免 prompt 注入
================================================================
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>领导力建模智能体</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
/* ══ 主题变量 ══════════════════════════════════════════════════ */
:root{
  --p:#6C216D; --p10:#F4ECF4; --p20:#E8D4E8; --p40:#BF88C0;
  --p60:#9A52A0; --p80:#7D3D7E; --pdk:#4A1550;
  --a:#E18C3F;  --a10:#FEF4E8; --a20:#FADCC0;
  --a60:#C97028; --adk:#A05510;
  --bg:#F7F4F8; --sf:#FFF; --sf2:#FAF7FB;
  --br:#EAE0EC; --brk:#D0C0D3;
  --t1:#1A1520; --t2:#5C506A; --t3:#9585A0;
  --gr:#0F6E56; --grbg:#E1F5EE;
  --am:#7A4A08; --ambg:#FEF3C7;
  --rd:#991B1B; --rdbg:#FEE2E2;
  --sh:0 2px 8px rgba(108,33,109,.08),0 1px 3px rgba(0,0,0,.04);
  --shh:0 8px 24px rgba(108,33,109,.14);
}
/* ══ 全局重置 ══════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',Arial,sans-serif;
  background:var(--bg);color:var(--t1);line-height:1.6;font-size:14px;
  height:100vh;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--brk);border-radius:5px}
/* ══ 布局外壳 ══════════════════════════════════════════════════ */
#hdr{background:var(--p);height:54px;padding:0 32px;display:flex;align-items:center;
  gap:20px;flex-shrink:0;box-shadow:0 1px 0 rgba(255,255,255,.08)}
#main{flex:1;overflow-y:auto;padding:18px 32px;max-width:1200px;margin:0 auto;width:100%}
#ftr{background:var(--sf);border-top:1px solid var(--br);padding:11px 32px;
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
/* ══ Header 组件 ═══════════════════════════════════════════════ */
.logo{font-size:14.5px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px;
  text-decoration:none;white-space:nowrap;cursor:pointer}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--a);flex-shrink:0}
.prog{display:flex;align-items:center;flex:1;gap:0;overflow:hidden}
.ps{display:flex;align-items:center;gap:5px;cursor:pointer;flex-shrink:0}
.pd{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s}
.pd.done{background:rgba(255,255,255,.28);color:#fff}
.pd.active{background:var(--a);color:#fff;box-shadow:0 0 0 3px rgba(225,140,63,.3)}
.pd.pending{background:rgba(255,255,255,.12);color:rgba(255,255,255,.38)}
.pl{font-size:11px;white-space:nowrap;color:rgba(255,255,255,.7)}
.pl.active{color:#fff;font-weight:500}
.pline{flex:1;height:1px;background:rgba(255,255,255,.2);min-width:12px}
.pline.done{background:rgba(255,255,255,.4)}
/* ══ Footer 组件 ═══════════════════════════════════════════════ */
.step-badge{font-size:12.5px;color:var(--t3);font-weight:500}
/* ══ 按钮系统 ══════════════════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:8px;
  font-size:13.5px;font-weight:500;border:1.5px solid transparent;cursor:pointer;
  transition:all .15s;font-family:inherit;text-decoration:none;line-height:1.3;white-space:nowrap}
.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.btn-p{background:var(--p);color:#fff}.btn-p:hover:not(:disabled){background:var(--p80)}
.btn-a{background:var(--a);color:#fff}.btn-a:hover{background:var(--a60)}
.btn-o{background:var(--sf);color:var(--t1);border-color:var(--br)}.btn-o:hover{background:var(--bg)}
.btn-g{background:transparent;color:var(--t2);border-color:transparent;padding:5px 10px}
.btn-g:hover{background:var(--bg)}
.btn-d{background:transparent;color:var(--rd);border-color:transparent;padding:5px 10px}
.btn-d:hover{background:var(--rdbg)}
.btn-sm{padding:5px 12px;font-size:12.5px}
.btn-lg{padding:12px 28px;font-size:15px}
/* ══ 通用卡片 ══════════════════════════════════════════════════ */
.card{background:var(--sf);border-radius:12px;border:1px solid var(--br);box-shadow:var(--sh)}
.card:hover{box-shadow:var(--shh)}
/* ══ 逻辑说明卡 ════════════════════════════════════════════════ */
.lcard{background:var(--p10);border:1.5px solid var(--p20);border-left:3px solid var(--p);
  border-radius:0 8px 8px 0;padding:11px 15px;margin-bottom:16px;font-size:13px}
.lcard b{color:var(--p80);display:block;margin-bottom:2px;font-size:13px;font-weight:600}
.lcard p{color:var(--t2);line-height:1.55}
/* ══ Badge / Tag ═══════════════════════════════════════════════ */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;
  border-radius:100px;font-size:11px;font-weight:500}
.bg-gr{background:var(--grbg);color:var(--gr)}
.bg-am{background:var(--ambg);color:var(--am)}
.bg-rd{background:var(--rdbg);color:var(--rd)}
.bg-p{background:var(--p10);color:var(--p80)}
.bg-a{background:var(--a10);color:var(--adk)}
.bg-gy{background:#F0EDF5;color:#6A5F7A}
/* ══ 区块标题行 ════════════════════════════════════════════════ */
.sec-row{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
.sec-t{font-size:16px;font-weight:600;color:var(--t1)}
.sec-s{font-size:12.5px;color:var(--t2);margin-top:3px}
/* ══ 模态框 ════════════════════════════════════════════════════ */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.44);
  z-index:200;align-items:center;justify-content:center;padding:20px}
#modal.show{display:flex}
.modal-box{background:var(--sf);border-radius:16px;padding:24px;
  width:100%;max-width:480px;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.modal-hd{font-size:16px;font-weight:600;margin-bottom:18px;display:flex;
  justify-content:space-between;align-items:center;color:var(--t1)}
.modal-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t3);line-height:1}
.ff{margin-bottom:13px}
.ff label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:5px}
.ff input,.ff textarea{width:100%;border:1.5px solid var(--br);border-radius:8px;
  padding:9px 12px;font-size:13.5px;font-family:inherit;outline:none;color:var(--t1);
  transition:border-color .15s;background:var(--sf)}
.ff input:focus,.ff textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--p10)}
.ff textarea{resize:vertical;min-height:80px;line-height:1.6}
.modal-ft{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
/* ══ Toast 提示 ════════════════════════════════════════════════ */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);
  background:#1A1520;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;
  opacity:0;transition:all .3s;z-index:300;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* ══ STEP 1 — 聊天 + 上传 ══════════════════════════════════════ */
.s1-grid{display:grid;grid-template-columns:1fr 300px;gap:14px;
  height:calc(100vh - 54px - 55px - 100px);min-height:380px}
.chat-pane{display:flex;flex-direction:column;background:var(--sf);border-radius:12px;
  border:1px solid var(--br);box-shadow:var(--sh);overflow:hidden}
.chat-ttl{padding:11px 14px;border-bottom:1px solid var(--br);display:flex;
  align-items:center;gap:8px;background:var(--sf2);flex-shrink:0}
.chat-ttl-main{font-size:13px;font-weight:600;color:var(--t1)}
.chat-ttl-sub{font-size:11.5px;color:var(--t3);margin-left:auto}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;
  gap:11px;min-height:0}
.msg{display:flex;gap:8px;max-width:90%}
.msg.ai{align-self:flex-start}.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.doc{align-self:flex-start}
.av{width:28px;height:28px;border-radius:50%;border:1.5px solid;display:flex;
  align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.av-ai{background:var(--p10);border-color:var(--p20);color:var(--p)}
.av-doc{background:var(--a10);border-color:var(--a20);color:var(--adk)}
.bub{padding:10px 13px;border-radius:11px;font-size:13.5px;line-height:1.65}
.bub-ai{background:var(--bg);border:1px solid var(--br);border-radius:3px 11px 11px 11px;color:var(--t1)}
.bub-user{background:var(--p);color:#fff;border-radius:11px 3px 11px 11px}
.bub-doc{background:var(--a10);border:1px solid var(--a20);border-radius:3px 11px 11px 11px;color:var(--adk)}
.typing{display:flex;gap:5px;align-items:center;padding:10px 13px;
  background:var(--bg);border:1px solid var(--br);border-radius:3px 11px 11px 11px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--p40);
  animation:tp 1.2s ease-in-out infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes tp{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}
.chat-foot{border-top:1px solid var(--br);padding:10px 12px;display:flex;
  gap:8px;background:var(--sf2);flex-shrink:0}
.ci{flex:1;border:1.5px solid var(--br);border-radius:8px;padding:8px 11px;font-size:13.5px;
  font-family:inherit;outline:none;resize:none;max-height:80px;line-height:1.5;color:var(--t1);
  background:var(--sf);transition:border-color .15s}
.ci:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--p10)}
.csend{background:var(--p);color:#fff;border:none;border-radius:8px;padding:8px 14px;
  cursor:pointer;font-size:13.5px;font-weight:500;transition:background .15s}
.csend:hover{background:var(--p80)}
.right-pane{display:flex;flex-direction:column;gap:11px;overflow-y:auto;min-height:0}
.sum-card{background:var(--sf);border-radius:12px;border:1px solid var(--br);
  box-shadow:var(--sh);overflow:hidden;flex-shrink:0}
.sum-hd{background:var(--p10);padding:10px 13px;font-size:12.5px;font-weight:600;
  color:var(--p80);border-bottom:1px solid var(--p20);display:flex;align-items:center;gap:7px}
.sum-bd{padding:12px 13px}
.sf3{margin-bottom:8px}.sf3:last-child{margin-bottom:0}
.sf3-l{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);
  margin-bottom:2px;font-weight:500}
.sf3-v{font-size:12.5px;color:var(--t1)}
.confirm-ok{background:var(--grbg);border:1px solid #86EFAC;border-radius:9px;
  padding:10px 13px;font-size:12.5px;color:var(--gr);font-weight:500;
  display:flex;align-items:center;gap:7px}
/* 上传区 */
.upload-card{background:var(--sf);border-radius:12px;border:1px solid var(--br);
  box-shadow:var(--sh);overflow:hidden}
.upload-hd{background:var(--a10);padding:10px 13px;font-size:12.5px;font-weight:600;
  color:var(--adk);border-bottom:1px solid var(--a20);display:flex;align-items:center;gap:7px}
.upload-hd span{font-size:11px;color:var(--a60);font-weight:400;margin-left:auto}
.dropzone{border:2px dashed var(--brk);border-radius:10px;padding:16px 13px;text-align:center;
  cursor:pointer;transition:all .2s;margin:11px;background:var(--bg);position:relative}
.dropzone:hover,.dropzone.over{border-color:var(--a);background:var(--a10)}
.dropzone p{font-size:12.5px;color:var(--t2);margin:4px 0}
.dropzone b{color:var(--a)}
.dropzone small{font-size:11px;color:var(--t3)}
.file-input-real{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.fl{display:flex;flex-direction:column}
.fi{padding:9px 13px;border-top:1px solid var(--br);display:flex;align-items:flex-start;gap:8px}
.fi-ico{font-size:17px;flex-shrink:0;margin-top:2px}
.fi-info{flex:1;min-width:0}
.fi-name{font-size:12.5px;font-weight:500;color:var(--t1);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.fi-meta{font-size:11px;color:var(--t3);margin-top:1px}
.fi-act{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.fi-act button{font-size:11.5px;padding:3px 9px;border-radius:6px;border:1px solid var(--br);
  background:var(--sf);color:var(--t2);cursor:pointer;transition:all .15s}
.fi-act button:hover{border-color:var(--a);color:var(--a);background:var(--a10)}
.fi-st{font-size:11px;padding:2px 8px;border-radius:100px;font-weight:500;flex-shrink:0}
.st-pend{background:var(--p10);color:var(--p60)}
.st-load{background:var(--ambg);color:var(--am)}
.st-done{background:var(--grbg);color:var(--gr)}
.st-err{background:var(--rdbg);color:var(--rd)}
.fi-res{background:var(--sf2);border-top:1px solid var(--br);padding:10px 13px;
  font-size:12px;color:var(--t2);line-height:1.65;display:none}
.fi-res.show{display:block}
.pbar{height:3px;background:var(--a20);border-radius:3px;margin-top:6px;overflow:hidden}
.pbar-fill{height:100%;background:var(--a);border-radius:3px;transition:width .4s;width:0}
/* ══ STEP 2 — 维度确认 ═════════════════════════════════════════ */
.dim-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:13px}
.dc{background:var(--sf);border-radius:12px;border:1.5px solid var(--br);
  box-shadow:var(--sh);overflow:hidden;transition:all .2s}
.dc:hover{box-shadow:var(--shh)}
.dc.ok{border-color:var(--gr)}
.dc-hd{padding:13px 14px 8px;display:flex;justify-content:space-between;align-items:flex-start;gap:7px}
.dc-nm{font-size:14px;font-weight:600;color:var(--t1)}
.dc-df{padding:0 14px 10px;font-size:12.5px;color:var(--t2);line-height:1.6}
.dc-src{padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:4px}
.src-tag{font-size:10.5px;padding:2px 7px;border-radius:100px}
.dc-ft{padding:8px 14px;border-top:1px solid var(--br);display:flex;gap:6px;background:var(--sf2)}
.dc.ok .dc-ft{background:var(--grbg)}
.alt-wrap{margin-top:20px;background:var(--sf);border-radius:12px;
  border:1px solid var(--br);padding:15px 17px;box-shadow:var(--sh)}
.alt-ttl{font-size:13px;font-weight:600;color:var(--t2);margin-bottom:10px;
  display:flex;align-items:center;gap:7px}
.alt-chips{display:flex;flex-wrap:wrap;gap:7px}
.alt-chip{padding:5px 12px;border-radius:100px;border:1.5px dashed var(--brk);
  font-size:12.5px;cursor:pointer;color:var(--t2);background:var(--sf);transition:all .15s}
.alt-chip:hover{border-color:var(--p);color:var(--p);background:var(--p10)}
/* ══ STEP 3 — 描述建立 ═════════════════════════════════════════ */
.desc-list{display:flex;flex-direction:column;gap:11px}
.di{background:var(--sf);border-radius:12px;border:1.5px solid var(--br);
  box-shadow:var(--sh);overflow:hidden}
.di-hd{padding:12px 14px 9px;display:flex;align-items:center;gap:10px}
.di-nm{font-size:14px;font-weight:600;flex:1;color:var(--t1);
  display:flex;align-items:center;gap:8px}
.di-nm::before{content:"";width:3px;height:16px;border-radius:2px;
  background:var(--p);flex-shrink:0}
.di-txt{padding:0 14px 11px;font-size:13.5px;color:var(--t1);line-height:1.75;cursor:text}
.di-txt:hover{background:var(--sf2)}
.di-iss{padding:7px 14px;font-size:12.5px;background:#FFFBEB;
  border-top:1px solid #FDE68A;color:#92400E}
.di-ft{padding:8px 14px;border-top:1px solid var(--br);display:flex;gap:7px;background:var(--sf2)}
.di-ea{padding:0 14px 11px}
.di-ea textarea{width:100%;border:1.5px solid var(--br);border-radius:8px;
  padding:9px 11px;font-size:13.5px;font-family:inherit;resize:vertical;
  min-height:70px;outline:none;line-height:1.7;color:var(--t1);background:var(--sf)}
.di-ea textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--p10)}
.regen-row{padding:0 14px 10px;display:flex;gap:7px}
.regen-row input{flex:1;border:1.5px solid var(--br);border-radius:8px;padding:7px 11px;
  font-size:13px;font-family:inherit;outline:none;color:var(--t1);background:var(--sf)}
.regen-row input:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--a10)}
.regen-btn{background:var(--a);color:#fff;border:none;border-radius:8px;
  padding:7px 13px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap}
.regen-btn:hover{background:var(--a60)}
/* ══ STEP 4 — 行为锚定 ═════════════════════════════════════════ */
.anc-acc{display:flex;flex-direction:column;gap:10px}
.anc-item{background:var(--sf);border-radius:12px;border:1.5px solid var(--br);
  box-shadow:var(--sh);overflow:hidden}
.anc-hd{padding:13px 15px;display:flex;align-items:center;gap:9px;
  cursor:pointer;user-select:none;transition:background .15s}
.anc-hd:hover{background:var(--sf2)}
.anc-chev{font-size:12px;color:var(--t3);transition:transform .2s;flex-shrink:0}
.anc-chev.open{transform:rotate(90deg)}
.anc-nm{font-size:14px;font-weight:600;flex:1;color:var(--t1)}
.anc-bd{display:none;padding:0 15px 15px}
.anc-bd.open{display:block}
.anc-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-top:11px}
.col-hd{font-size:12px;font-weight:600;padding:5px 9px;border-radius:7px;
  margin-bottom:7px;text-align:center;display:flex;align-items:center;justify-content:center;gap:5px}
.col-ex{background:var(--grbg);color:var(--gr)}
.col-st{background:var(--p10);color:var(--p80)}
.col-bl{background:var(--rdbg);color:var(--rd)}
.beh{font-size:12.5px;color:var(--t1);line-height:1.65;padding:7px 9px;border-radius:7px;
  background:var(--bg);margin-bottom:5px;border:1.5px solid transparent;
  outline:none;display:block;width:100%;transition:all .15s;cursor:text}
.beh:hover{border-color:var(--br);background:var(--sf)}
.beh:focus{border-color:var(--p);background:var(--sf);box-shadow:0 0 0 3px var(--p10)}
/* ══ STEP 5 — 总览导出 ═════════════════════════════════════════ */
.done-banner{background:linear-gradient(135deg,var(--pdk) 0%,var(--p) 55%,var(--p60) 100%);
  border-radius:14px;padding:22px 26px;color:#fff;margin-bottom:20px;
  display:flex;align-items:center;justify-content:space-between;gap:20px}
.done-banner h2{font-size:21px;font-weight:700;margin-bottom:4px}
.done-banner p{font-size:14px;opacity:.82;line-height:1.6}
.done-btns{display:flex;gap:9px;flex-shrink:0;flex-wrap:wrap}

/* ════════════════════════════════════════════════════════════
   4. Anthropic API 封装

/**
 * 通用 Claude 消息调用
 * @param {string} sys - System prompt
 * @param {Array}  messages - [{ role, content }]
 * @param {number} maxTokens
 * @returns {Promise<string>}
 */
async function callClaude(sys, messages, maxTokens = 1000) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      system: sys,
      messages,
    }),
  });
  const data = await resp.json();
  if (!data.content) throw new Error(data.error?.message || 'API 异常');
  return data.content.map(c => c.text || '').join('');
}

/** 文档分析专用提示词 */

【高绩效行为特征】：2-4条高绩效管理者典型行为描述
【能力要求关键词】：文档中出现的管理者能力要求关键词（逗号分隔）
【建模参考重点】：1-2条最值得纳入领导力模型的核心洞察

用中文回答，每项不超过150字。文档内容不足时如实说明。`;

   5. 路由 & 导航
════════════════════════════════════════════════════════════ */
function navigate(step) {
  if (step < 1 || step > 5) return;
  STATE.step = step;
  renderHeader();
  renderFooter();
  [null, renderStep1, renderStep2, renderStep3, renderStep4, renderStep5][step]();
  window.scrollTo(0, 0);
  localStorage.setItem('lm_step', step);
}

function renderHeader() {
  const s = STATE.step;
  let prog = '';
  STEP_LABELS.forEach((l, i) => {
    const n = i + 1;
    const cls = n < s ? 'done' : n === s ? 'active' : 'pending';
    const dot = n < s ? '✓' : n;
    const lbl = n < s ? '' : `<span class="pl ${n===s?'active':''}">${l}</span>`;
    prog += `<div class="ps" onclick="navigate(${n})">
      <div class="pd ${cls}">${dot}</div>${lbl}
    </div>`;
    if (i < 4) prog += `<div class="pline ${n < s ? 'done' : ''}"></div>`;
  });
  document.getElementById('hdr').innerHTML = `
    <span class="logo" onclick="navigate(1)"><span class="logo-dot"></span>领导力建模智能体</span>
    <nav class="prog">${prog}</nav>`;
}

function renderFooter() {
  const s = STATE.step;
  const back = s > 1
    ? `<button class="btn btn-o" onclick="navigate(${s-1})">← 上一步</button>`
    : `<span></span>`;
  const nxtLabels = ['','确认摘要，生成维度 →','确认维度，生成描述 →','确认描述，生成行为锚定 →','完成确认，查看总览 →',''];
  const canGo = canProceed();
  const nxt = s < 5
    ? `<button class="btn btn-p" onclick="goNext()" ${canGo?'':'disabled'}>${nxtLabels[s]}</button>`
    : `<div style="display:flex;gap:9px">
        <button class="btn-word btn" onclick="doExport('word')">⬇ 导出 Word</button>
        <button class="btn-pdf btn" onclick="doExport('pdf')">⬇ 导出 PDF</button>
        <button class="btn btn-o" onclick="navigate(1)">重新建模</button>
       </div>`;
  document.getElementById('ftr').innerHTML = `
    ${back}
    <span class="step-badge">步骤 ${s} / 5 — ${STEP_LABELS[s-1]}</span>
    ${nxt}`;
}

function canProceed() {
  const s = STATE.step;
  if (STATE.loading) return false;
  if (s === 1) return STATE.summaryConfirmed;
  if (s === 2) return STATE.dims.filter(d => d.ok).length >= 3;
  if (s === 3) return STATE.descs.length > 0;
  if (s === 4) return STATE.anchors.length > 0;
  return true;
}

function goNext() {
  if (!canProceed()) return;
  const next = STATE.step + 1;
  if (next >= 3 && next <= 4) {
    STATE.loading = true;
    renderFooter();
    const ldgColors = ['','','#0F6E56','#993C1D','#854F0B'];
    document.getElementById('main').innerHTML = `
      <div class="ldg">
        <div style="font-size:32px;margin-bottom:8px">✨</div>
        <div class="ldots">
          <span style="background:${ldgColors[next]}"></span>
          <span style="background:${ldgColors[next]}"></span>

/* —— 文件上传 —— */
function dzEv(e, t) {
  e.preventDefault(); e.stopPropagation();
  const dz = document.getElementById('dz');
  if (t === 'over') dz.classList.add('over');
  else if (t === 'leave') dz.classList.remove('over');
  else { dz.classList.remove('over'); handleFiles(e.dataTransfer.files); }
}
function handleSel(files) { handleFiles(files); }
function handleFiles(files) {
  Array.from(files).forEach(f => {
    if (f.size > 10 * 1024 * 1024) { showToast(`${f.name} 超过 10MB`, 'err'); return; }
    const id = 'f' + Date.now() + Math.random().toString(36).slice(2, 6);
    STATE.uploadFiles.push({ id, file: f, status: 'pending', result: null });
    renderFileList();
  });
}

function renderFileList() {
  const fl = document.getElementById('fl'); if (!fl) return;
  fl.innerHTML = STATE.uploadFiles.map(rec => fileItemHTML(rec)).join('');
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}
function fIcon(n) {
  if (/\.pdf$/i.test(n)) return '📕';
  if (/\.docx?$/i.test(n)) return '📘';
  return '📄';
}
function stCls(s) { return {pending:'st-pend',loading:'st-load',done:'st-done',error:'st-err'}[s]; }
function stLbl(s) { return {pending:'待解析',loading:'解析中…',done:'✓ 完成',error:'解析失败'}[s]; }

function fileItemHTML(rec) {
  const f = rec.file;
  let actions = '';
  if (rec.status === 'pending' || rec.status === 'error') {
    actions = `<button onclick="analyzeFile('${rec.id}')">🔍 AI 解析</button>
               <button onclick="removeFile('${rec.id}')">删除</button>`;
  } else if (rec.status === 'loading') {
    actions = `<div class="pbar"><div class="pbar-fill" id="pb_${rec.id}" style="width:25%"></div></div>`;
  } else if (rec.status === 'done') {
    actions = `<button onclick="toggleResult('${rec.id}')">查看结果 ↕</button>
               <button onclick="removeFile('${rec.id}')">删除</button>`;
  }
  const resHtml = rec.result
    ? `<div class="fi-res" id="res_${rec.id}">${formatAnalysis(rec.result)}</div>` : '';
  return `<div class="fi" id="fi_${rec.id}">
    <span class="fi-ico">${fIcon(f.name)}</span>
    <div class="fi-info">
      <div class="fi-name" title="${f.name}">${f.name}</div>
      <div class="fi-meta">${fmtSize(f.size)}</div>
      <div class="fi-act">${actions}</div>
    </div>
    <span class="fi-st ${stCls(rec.status)}">${stLbl(rec.status)}</span>
  </div>${resHtml}`;
}

function updateFileItem(rec) {
  const old = document.getElementById('fi_' + rec.id);
  const oldRes = document.getElementById('res_' + rec.id);
  if (old) {
    const wrapper = document.createElement('div');
    wrapper.innerHTML = fileItemHTML(rec);
    old.replaceWith(wrapper.children[0]);
    if (oldRes) { oldRes.remove(); }
    // Re-insert result if exists
    if (rec.result) {
      const newFi = document.getElementById('fi_' + rec.id);
      const resDiv = document.createElement('div');
      resDiv.className = 'fi-res';
      resDiv.id = 'res_' + rec.id;
      resDiv.innerHTML = formatAnalysis(rec.result);
      newFi && newFi.insertAdjacentElement('afterend', resDiv);
    }
  }
}

function removeFile(id) {
  STATE.uploadFiles = STATE.uploadFiles.filter(r => r.id !== id);
  document.getElementById('fi_' + id)?.remove();
  document.getElementById('res_' + id)?.remove();
}

function toggleResult(id) {
  document.getElementById('res_' + id)?.classList.toggle('show');
}

function formatAnalysis(text) {
  let html = '<div style="font-size:12px;font-weight:600;color:var(--adk);margin-bottom:8px">📊 文档解析结果</div>';
  const parts = text.split(/【(.+?)】/).filter(Boolean);
  if (parts.length > 1) {
    for (let i = 0; i < parts.length; i += 2) {
      html += `<div style="margin-bottom:9px">
        <div style="font-size:11px;font-weight:600;color:var(--p80);margin-bottom:3px">【${parts[i]}】</div>
        <div style="font-size:12px;color:var(--t2);line-height:1.65">${(parts[i+1]||'').trim()}</div>
      </div>`;
    }
  } else {
    html += `<div style="font-size:12px;color:var(--t2);line-height:1.65">${text.replace(/\n/g,'<br>')}</div>`;
  }
  return html;
}

async function analyzeFile(id) {
  const rec = STATE.uploadFiles.find(r => r.id === id); if (!rec) return;
  rec.status = 'loading';
  updateFileItem(rec);
  // 动画进度条
  let pct = 20;
  const iv = setInterval(() => {
    pct = Math.min(pct + 7, 85);
    const pb = document.getElementById('pb_' + id);
    if (pb) pb.style.width = pct + '%';
  }, 350);
  try {
    const content = await readFileContent(rec.file);
    clearInterval(iv);
    const result = await callClaudeDoc(content, rec.file.name);
    rec.result = result; rec.status = 'done';
    const kwMatch = result.match(/【战略关键词】[：:]\s*(.{0,80})/);
    if (kwMatch) STATE.docContext.push(kwMatch[1].split(/[，,]/)[0].trim());
    updateFileItem(rec);
    toggleResult(id);
    addMsg('doc',
      `📄 <strong>${rec.file.name}</strong> 已解析完成，关键信息已注入建模上下文。` +
      (kwMatch ? `<br>发现战略关键词：${kwMatch[1].slice(0,60)}…` : '')
    );
    showToast(`${rec.file.name} 解析完成`, 'ok');
  } catch (err) {
    clearInterval(iv);
    rec.status = 'error'; updateFileItem(rec);
    addMsg('ai', `⚠️ 解析 <strong>${rec.file.name}</strong> 时遇到问题：${err.message || '请检查文件格式后重试'}。`);
    showToast('解析失败：' + (err.message || '未知错误'), 'err');
  }
}

async function callClaudeDoc(content, filename) {
  let messages;
  if (content.type === 'pdf') {
    messages = [{ role:'user', content:[
      { type:'document', source:{ type:'base64', media_type:'application/pdf', data:content.data }},
      { type:'text', text:`请分析这份PDF（文件名：${filename}），提取与领导力建模相关的核心信息。` }
    ]}];
  } else {
    const text = (content.text || '').slice(0, 8000);
    messages = [{ role:'user', content:`分析以下文档，提取领导力建模核心信息。\n文件名：${filename}\n\n${text}` }];
  }
  return callClaude(DOC_ANALYSIS_SYS, messages, 1000);
}

async function readFileContent(file) {
  const n = file.name.toLowerCase();
  if (n.endsWith('.pdf') || file.type === 'application/pdf') {
    return { type:'pdf', data: await toB64(file) };
  }
  if (n.endsWith('.docx') || n.endsWith('.doc')) {
    const buf = await rdBuf(file);
    if (typeof mammoth !== 'undefined') {
      const r = await mammoth.extractRawText({ arrayBuffer: buf });
      return { type:'text', text: r.value };
    }
    return { type:'text', text:'[DOCX - mammoth.js 未加载，请稍后重试]' };
  }
  return { type:'text', text: await rdTxt(file) };
}
const toB64 = f => new Promise((res,rej) => { const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(f); });
const rdBuf = f => new Promise((res,rej) => { const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsArrayBuffer(f); });
const rdTxt = f => new Promise((res,rej) => { const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsText(f,'UTF-8'); });

    </div>

    ${altChips ? `<div class="alt-wrap">
      <div class="alt-ttl">＋ 备选维度池 <span style="font-size:11.5px;font-weight:400;color:var(--t3)">点击添加</span></div>

function editDesc(id) { STATE.descs.forEach(d=>d.em=d.id===id); renderStep3(); setTimeout(()=>document.getElementById('ta_'+id)?.focus(),50); }
function cancelDesc(id) { const d=STATE.descs.find(x=>x.id===id); if(d)d.em=false; renderStep3(); }
function saveDesc(id) {
  const d=STATE.descs.find(x=>x.id===id); if(!d)return;

function togRegen(id) {

function regenDesc(id) {
  const d=STATE.descs.find(x=>x.id===id); if(!d)return;
  const dir=document.getElementById('rd_'+id)?.value||'优化表述';
  const nm=STATE.dims.find(x=>x.id===id)?.nm||'该维度';
  d.rm=false; d.desc='⏳ 重新生成中…'; renderStep3();
  setTimeout(()=>{
    d.desc=`根据「${dir}」方向：在中层管理者层级，${nm}要求管理者能够系统性展现相关能力，结合业务特点转化为可观察的具体行动和可衡量的成果，并定期复盘持续优化。`;
    d.qc={ok:true,issues:[]}; renderStep3();
  }, 1100);
}

/* ════════════════════════════════════════════════════════════
   9. STEP 4 — 行为锚定
════════════════════════════════════════════════════════════ */
function renderStep4() {
  const okDims = STATE.dims.filter(d=>d.ok).map(d=>d.id);
  const visible = STATE.anchors.filter(a => okDims.includes(a.id));
  const items = visible.map((a,i) => {
    const isOpen = STATE.openAnchors[a.id] !== false && (i===0 || STATE.openAnchors[a.id]);
    return `<div class="anc-item">
      <div class="anc-hd" onclick="togAnc('${a.id}')">
        <span class="anc-chev ${isOpen?'open':''}" id="chv_${a.id}">▶</span>
        <span class="anc-nm">${a.nm}</span>
        <span class="badge bg-gy">${a.ex.length+a.st.length+a.bl.length} 条行为</span>
      </div>
      <div class="anc-bd ${isOpen?'open':''}" id="abd_${a.id}">
        <div class="anc-cols">
          <div>
            <div class="col-hd col-ex">⭐ 优秀水平</div>
            ${a.ex.map((t,j)=>`<div class="beh" contenteditable="true"
              onblur="saveBeh('${a.id}','ex',${j},this.textContent)">${t}</div>`).join('')}
          </div>
          <div>
            <div class="col-hd col-st">✅ 达标水平</div>
            ${a.st.map((t,j)=>`<div class="beh" contenteditable="true"
              onblur="saveBeh('${a.id}','st',${j},this.textContent)">${t}</div>`).join('')}
          </div>
          <div>
            <div class="col-hd col-bl">⚠️ 不达标</div>
            ${a.bl.map((t,j)=>`<div class="beh" contenteditable="true"
              onblur="saveBeh('${a.id}','bl',${j},this.textContent)">${t}</div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="lcard"><b>行为锚定生成（M04）— 第三次人机交接</b>
    <p>AI 已生成 BARS 行为锚定（优秀 / 达标 / 不达标三档）。点击展开每个维度，直接点击行为描述进行编辑，所有描述须以行为动词开头。</p></div>
    <div class="sec-row"><div class="sec-t">行为锚定（BARS）</div>
    <div class="sec-s">点击展开查看并编辑各维度行为描述</div></div>
    <div class="anc-acc">${items}</div>`;
}

function togAnc(id) {
  STATE.openAnchors[id] = !STATE.openAnchors[id];
  const bd=document.getElementById('abd_'+id); const chv=document.getElementById('chv_'+id);
  if(bd) bd.classList.toggle('open');
  if(chv) { chv.classList.toggle('open'); chv.textContent=chv.classList.contains('open')?'▼':'▶'; }
}
function saveBeh(aid, lv, idx, text) {
  const a=STATE.anchors.find(x=>x.id===aid); if(a&&a[lv]) a[lv][idx]=text.trim();
}

/* ════════════════════════════════════════════════════════════
   10. STEP 5 — 总览导出
════════════════════════════════════════════════════════════ */
function renderStep5() {
  const okDims = STATE.dims.filter(d=>d.ok).map(d=>d.id);
  const visAnchors = STATE.anchors.filter(a=>okDims.includes(a.id));
  const total = visAnchors.reduce((n,a)=>n+a.ex.length+a.st.length+a.bl.length, 0);
  const now = new Date();
  const timeStr = now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');

  const ovItems = visAnchors.map((a,i) => {
    const desc = STATE.descs.find(d=>d.id===a.id);
    const isOpen = STATE.openOverviews[a.id] || false;
    return `<div class="ov-item">
      <div class="ov-hd" onclick="togOv('${a.id}')">
        <div class="ov-num">${i+1}</div>
        <div class="ov-nm">${a.nm}</div>
        <span class="ov-chev ${isOpen?'open':''}">▶</span>
      </div>
      <div class="ov-bd ${isOpen?'open':''}" id="ovbd_${a.id}">
        ${desc?`<div class="ov-desc">${desc.desc}</div>`:''}
        <div class="bsec">
          <div class="bsec-lbl" style="color:var(--gr)">⭐ 优秀水平</div>
          ${a.ex.map(t=>`<div class="brow brow-ex">${t}</div>`).join('')}
        </div>
        <div class="bsec">
          <div class="bsec-lbl" style="color:var(--p80)">✅ 达标水平</div>
          ${a.st.map(t=>`<div class="brow brow-st">${t}</div>`).join('')}
        </div>
        <div class="bsec">
          <div class="bsec-lbl" style="color:var(--rd)">⚠️ 不达标</div>
          ${a.bl.map(t=>`<div class="brow brow-bl">${t}</div>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="done-banner">
      <div>
        <h2>🏆 领导力模型构建完成！</h2>
        <p>中层管理者领导力模型 · ${okDims.length} 个维度 · ${total} 条行为锚定</p>
      </div>
      <div class="done-btns">
        <button class="btn-word" onclick="doExport('word')">⬇ 导出 Word</button>
        <button class="btn-pdf" onclick="doExport('pdf')">⬇ 导出 PDF</button>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-n">${okDims.length}</div><div class="stat-l">领导力维度</div></div>
      <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">行为锚定描述</div></div>
      <div class="stat"><div class="stat-n">${STATE.descs.filter(d=>d.qc.ok).length}</div><div class="stat-l">质检通过描述</div></div>
      <div class="stat"><div class="stat-n">${timeStr}</div><div class="stat-l">完成时间</div></div>
    </div>
    <div class="sec-row">
      <div class="sec-t">完整模型总览</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-o btn-sm" onclick="expandAll()">全部展开</button>
        <button class="btn btn-o btn-sm" onclick="collapseAll()">全部收起</button>
      </div>
    </div>
    <div class="ov-list">${ovItems}</div>
    <div style="margin-top:24px;background:var(--sf);border-radius:12px;border:1px solid var(--br);
      padding:18px 22px;text-align:center">
      <p style="font-size:13.5px;color:var(--t2);margin-bottom:14px">需要为其他层级建模，或从头开始？</p>
      <button class="btn btn-o" onclick="navigate(1)">← 重新建模</button>
    </div>`;
}

function togOv(id) {
  STATE.openOverviews[id]=!STATE.openOverviews[id];
  const bd=document.getElementById('ovbd_'+id);
  const chv=bd?.previousElementSibling?.querySelector('.ov-chev');
  if(bd)bd.classList.toggle('open');
  if(chv)chv.classList.toggle('open');
}
function expandAll() {
  STATE.anchors.filter(a=>STATE.dims.find(d=>d.id===a.id&&d.ok)).forEach(a=>STATE.openOverviews[a.id]=true);
  renderStep5();
}
function collapseAll() { STATE.openOverviews={}; renderStep5(); }
function doExport(type) {
  showToast(`正在生成 ${type==='word'?'Word (.docx)':'PDF (.pdf)'} 文档…`, 'ok');
  setTimeout(()=>alert(
    `✅ 导出 ${type==='word'?'Word':'PDF'} 文档\n\n《中层管理者领导力模型》\n` +
    `包含：${STATE.dims.filter(d=>d.ok).length} 个维度 · 维度定义 · 定位描述 · 行为锚定对照表\n\n` +
    `（原型演示模式 · 生产环境使用 docx.js 或服务端生成）`
  ), 400);
}

/* ════════════════════════════════════════════════════════════
   11. 模态框管理
════════════════════════════════════════════════════════════ */
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('show');
  STATE.modal = null;
}
function saveModal() {
  if (!STATE.modal) return;
  if (STATE.modal.type === 'dim') {
    const d = STATE.dims.find(x=>x.id===STATE.modal.id);
    if (d) { d.nm=document.getElementById('m-nm').value; d.df=document.getElementById('m-df').value; }
    document.getElementById('modal').classList.remove('show');
    STATE.modal = null;
    renderStep2(); renderFooter();
  }
}

/* ════════════════════════════════════════════════════════════
   12. 工具函数
════════════════════════════════════════════════════════════ */
function showToast(msg, type = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type==='err' ? '#991B1B' : '#1A1520';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

/* ════════════════════════════════════════════════════════════
   13. 初始化
════════════════════════════════════════════════════════════ */
navigate(1);
</script>
</body>
</html>
